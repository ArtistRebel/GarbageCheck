name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable && pnpm install --dangerously-allow-all-builds
        working-directory: artifacts/volume-estimator

      - run: pnpm run build
        working-directory: artifacts/volume-estimator
        env:
          PORT: 5173
          BASE_PATH: /GarbageCheck/

      - name: Check build
        run: ls -la artifacts/volume-estimator/dist

      - uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/volume-estimator/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - uses: actions/deploy-pages@v4
